name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install --progress-bar off -r requirements-ci.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v -s

      - name: Update best accuracy baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          python scripts/compare_accuracy.py

      - name: Commit updated baseline
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if git status --porcelain | grep "model/best_accuracy.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add model/best_accuracy.json
            git commit -m "chore: update best accuracy [skip ci]"
            git push
          else
            echo "No baseline update."
          fi

  build-and-deploy:
    name: Build and Deploy Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fastapi-classifier:latest
            ${{ secrets.DOCKER_USERNAME }}/fastapi-classifier:v1.${{ github.run_number }}