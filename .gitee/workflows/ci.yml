name: FastAPI Classifier CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 运行模型准确率测试
        run: pytest tests/test_model.py

      - name: 运行API接口测试
        run: pytest tests/test_api.py

      - name: 构建Docker镜像
        run: docker build -t fastapi-classifier .

      - name: 登录并推送Docker镜像（可选，需配置DOCKERHUB_TOKEN等）
        if: ${{ success() && github.event_name == 'push' }}
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker tag fastapi-classifier ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-classifier:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-classifier:latest

      - name: 自动部署（可选，需配置服务器信息）
        if: ${{ success() && github.event_name == 'push' }}
        run: |
          echo "可在此处添加SSH远程部署脚本，如 scp/docker-compose up 等"
