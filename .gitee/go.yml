version: '1.0'
name: pipeline-fastapi-classifier
displayName: fastapiclassifier
triggers:
  push:
    - matchType: REGEX
      branch: ^master$
stages:
  - name: test
    displayName: 自动化测试阶段
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@python
        name: run-tests
        displayName: 运行模型准确率验证和 API 测试
        pythonVersion: 3.10
        commands:
          - pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          - pytest tests/ -v
          
  - name: deploy
    displayName: Docker 构建与部署阶段
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@docker
        name: build-image
        displayName: 构建并推送 Docker 镜像
        dockerfile: Dockerfile
        imageName: fastapi-classifier
        imageTag: latest
